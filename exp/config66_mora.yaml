a_qconfig:
    quantizer: LSQFakeQuantize
    observer: AvgMinMaxObserver
    bit: 6
    symmetric: False
    ch_axis: -1
w_qconfig:
    quantizer: AdaRoundFakeQuantize
    observer: MSEObserver
    bit: 6
    symmetric: False
    ch_axis: 0
calibrate: 16
recon:
    batch_size: 1
    scale_lr: 8.0e-4
    warm_up: 0.2
    weight: 0.01
    iters: 5000
    b_range: [20, 2]
    keep_gpu: True
    round_mode: learned_hard_sigmoid
    drop_prob: 0.5
ptq4sam:
    # ========================================
    # PTQ4SAM核心量化技术开关
    # ========================================
    # Bimodal Integration - 双峰分布处理
    BIG: True
    global_num: 128
    peak_distance: 32
    peak_height: 0.01
    
    # ========================================
    # Softmax量化策略选择（三选一）
    # ========================================
    # 方案1: DIAGQ - 融合DFQ动态区间 + AGQ自适应粒度（推荐）
    DIAGQ: True           # 启用动态区间自适应粒度量化器
    AGQ: False            # 关闭原始AGQ
    USE_DFQ: False        # 关闭纯DFQ
    
    # 方案2: 原始AGQ（取消注释下面两行，注释上面三行）
    # DIAGQ: False
    # AGQ: True
    # USE_DFQ: False
    
    # 方案3: 纯DFQ（取消注释下面三行，注释上面三行）
    # DIAGQ: False
    # AGQ: False
    # USE_DFQ: True
    
    # ========================================
    # DIAGQ专属参数配置
    # ========================================
    diagq_config:
        enable_interval_learning: True          # 先用False避免显存问题 | True:完整版(需要更多显存)
        tau_candidates: [1, 2, 4]               # 简化搜索空间
        low_org: 0.0005                         # 5e-4
        # False模式：只搜索tau，不搜索区间 -> 显存占用极小 (3次搜索)
        # True模式：联合搜索(mid,tau) -> 显存占用较大 (21次搜索)
    
    # ========================================
    # MoRA旁路量化配置
    # ========================================
    mora_config:
        enabled: True                # 设置为False以禁用MoRA
        rank: 256                    # 方阵的秩
        alpha: 0.5                   # 旁路相对主路的权重因子
        targetModules: ['Linear']    # 目标模块类型